<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מנוע חיפוש וידאו מסונן v2.0</title>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
            --primary: #1a73e8;
            --success: #2ecc71;
            --danger: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: #2c3e50;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .header { text-align: center; margin-bottom: 40px; }
        
        .search-area {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
        }

        input {
            flex: 1;
            padding: 15px 25px;
            border: 1px solid #ddd;
            border-radius: 15px;
            font-size: 18px;
            outline: none;
            transition: border 0.3s;
        }
        input:focus { border-color: var(--primary); }

        button {
            padding: 15px 35px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        button:hover { background: #1557b0; transform: translateY(-2px); }
        button:disabled { background: #ccc; cursor: not-allowed; }

        .grid-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 40px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(0,0,0,0.05);
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .video-card {
            background: white;
            border-radius: 18px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            border: 1px solid #eee;
            animation: fadeIn 0.5s ease forwards;
        }
        .video-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        .thumb-container { position: relative; padding-top: 56.25%; }
        .thumb-container img { position: absolute; top: 0; width: 100%; height: 100%; object-fit: cover; }

        .card-content { padding: 15px; }
        .card-content h3 { margin: 0; font-size: 15px; line-height: 1.4; height: 42px; overflow: hidden; }

        .status-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            z-index: 10;
        }
        .status-checking { background: #fef7e0; color: #b05a00; border: 1px solid #ffe168; }
        .status-open { background: #e6f4ea; color: #1e7e34; border: 1px solid #34a853; }
        .status-blocked { background: #fce8e6; color: #d93025; border: 1px solid #ea4335; }

        #hidden-checker { position: fixed; top: -1000px; left: -1000px; width: 1px; height: 1px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🔍 חיפוש וידאו חכם</h1>
        <p>בדיקה אוטומטית של זמינות סרטונים בסינון הנוכחי</p>
    </div>

    <div class="search-area">
        <input type="text" id="searchInput" placeholder="הקלידו נושא לחיפוש...">
        <button id="searchBtn" onclick="handleSearch()">חפש עכשיו</button>
    </div>

    <div id="resultsArea" style="display:none;">
        <div class="grid-title">
            <span style="font-size: 24px;">✅</span>
            <h2>סרטונים זמינים לצפייה</h2>
        </div>
        <div id="openGrid" class="video-grid"></div>

        <div class="grid-title" style="margin-top: 60px;">
            <span style="font-size: 24px;">❌</span>
            <h2>סרטונים חסומים או בבדיקה</h2>
        </div>
        <div id="blockedGrid" class="video-grid"></div>
    </div>
</div>

<div id="hidden-checker"></div>

<script>
    const API_KEY = 'AIzaSyClbzreAS3p3pzS16vpjgb41KAKIHL5Vtk';
    const MAX_CONCURRENT_CHECKS = 2; // מספר בדיקות במקביל
    const videoCache = {}; // Cache לתוצאות
    let isYTReady = false;

    function onYouTubeIframeAPIReady() { isYTReady = true; }

    async function handleSearch() {
        if (!isYTReady) return alert("הספריה עדיין נטענת...");
        const query = document.getElementById('searchInput').value;
        if (!query) return;

        const btn = document.getElementById('searchBtn');
        btn.disabled = true;
        
        document.getElementById('resultsArea').style.display = 'block';
        document.getElementById('openGrid').innerHTML = '';
        document.getElementById('blockedGrid').innerHTML = '';

        try {
            const response = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=12&q=${encodeURIComponent(query)}&type=video&key=${API_KEY}`);
            const data = await response.json();

            if (data.error) {
                if (data.error.message.includes('quota')) alert("חרגת ממכסת החיפושים היומית של גוגל.");
                else alert("שגיאת API: " + data.error.message);
                return;
            }

            // יצירת הכרטיסים במצב "בבדיקה"
            const videos = data.items;
            videos.forEach(v => renderPlaceholder(v));

            // תור בדיקה חכם (Queue)
            for (let i = 0; i < videos.length; i += MAX_CONCURRENT_CHECKS) {
                const chunk = videos.slice(i, i + MAX_CONCURRENT_CHECKS);
                await Promise.all(chunk.map(v => checkAccess(v.id.videoId)));
            }

        } catch (e) {
            console.error(e);
        } finally {
            btn.disabled = false;
        }
    }

    function renderPlaceholder(v) {
        const id = v.id.videoId;
        const grid = document.getElementById('blockedGrid');
        const card = document.createElement('div');
        card.className = 'video-card';
        card.id = `card-${id}`;
        card.innerHTML = `
            <div id="status-${id}" class="status-tag status-checking">בבדיקה...</div>
            <div class="thumb-container">
                <img src="${v.snippet.thumbnails.medium.url}">
            </div>
            <div class="card-content">
                <h3>${v.snippet.title}</h3>
                <a href="https://youtube.com/watch?v=${id}" target="_blank" style="color:var(--primary); font-size:13px; text-decoration:none;">צפה ביוטיוב ←</a>
            </div>
        `;
        grid.appendChild(card);
    }

    function checkAccess(videoId) {
        return new Promise((resolve) => {
            // בדיקת Cache
            if (videoCache[videoId] !== undefined) {
                updateUI(videoId, videoCache[videoId]);
                return resolve();
            }

            const checkDiv = document.createElement('div');
            const divId = `check-${videoId}`;
            checkDiv.id = divId;
            document.getElementById('hidden-checker').appendChild(checkDiv);

            let hasResolved = false;

            const player = new YT.Player(divId, {
                videoId: videoId,
                playerVars: { 'autoplay': 1, 'mute': 1, 'origin': window.location.origin },
                events: {
                    'onReady': (e) => {
                        e.target.playVideo();
                    },
                    'onStateChange': (e) => {
                        // אם הסרטון התחיל להתנגן או להיטען (Buffering) - הוא פתוח בוודאות
                        if (!hasResolved && (e.data === YT.PlayerState.PLAYING || e.data === YT.PlayerState.BUFFERING)) {
                            hasResolved = true;
                            finish(true);
                        }
                    },
                    'onError': () => {
                        if (!hasResolved) {
                            hasResolved = true;
                            finish(false);
                        }
                    }
                }
            });

            // Timeout ליתר ביטחון
            const timeout = setTimeout(() => {
                if (!hasResolved) {
                    hasResolved = true;
                    finish(false);
                }
            }, 6000);

            function finish(isOpen) {
                clearTimeout(timeout);
                videoCache[videoId] = isOpen;
                updateUI(videoId, isOpen);
                
                // ניקוי זיכרון ו-DOM
                try {
                    player.destroy();
                    const el = document.getElementById(divId);
                    if (el) el.remove();
                } catch (err) {}
                
                resolve();
            }
        });
    }

    function updateUI(id, isOpen) {
        const card = document.getElementById(`card-${id}`);
        const tag = document.getElementById(`status-${id}`);
        if (!card || !tag) return;

        if (isOpen) {
            tag.innerText = "פתוח";
            tag.className = "status-tag status-open";
            document.getElementById('openGrid').prepend(card);
        } else {
            tag.innerText = "חסום";
            tag.className = "status-tag status-blocked";
        }
    }
</script>

</body>
</html>
