<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>בודק סרטונים - בדיקת נגן ישירה</title>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .search-box { display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { padding: 12px 25px; cursor: pointer; background: #1a73e8; color: white; border: none; border-radius: 8px; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #1557b0; }
        
        .section { margin-top: 20px; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .video-card { background: #fff; border: 1px solid #e0e0e0; padding: 10px; border-radius: 8px; text-align: center; position: relative; }
        .status-badge { font-size: 12px; padding: 3px 8px; border-radius: 12px; margin-bottom: 8px; display: inline-block; }
        .open-badge { background: #e6f4ea; color: #1e7e34; }
        .blocked-badge { background: #fce8e6; color: #d93025; }
        .checking-badge { background: #fef7e0; color: #b05a00; }
        
        .video-card img { width: 100%; border-radius: 6px; margin-top: 5px; }
        .video-card a { display: block; margin-top: 10px; text-decoration: none; color: #1a73e8; font-weight: 500; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        #hidden-check-container { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>חיפוש סרטונים בבדיקה ישירה</h1>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="מה תרצו לחפש?">
        <button onclick="searchVideos()">חפש ובדוק גישה</button>
    </div>

    <div class="section">
        <h2 style="color: #1e7e34;">✅ סרטונים פתוחים</h2>
        <div id="openVideos" class="video-grid"></div>
    </div>

    <div class="section" style="margin-top: 50px;">
        <h2 style="color: #d93025;">❌ סרטונים חסומים / לא נגישים</h2>
        <div id="blockedVideos" class="video-grid"></div>
    </div>
</div>

<div id="hidden-check-container"></div>

<script>
    const API_KEY = 'AIzaSyClbzreAS3p3pzS16vpjgb41KAKIHL5Vtk'; // <--- הכנס כאן את המפתח שלך

    async function searchVideos() {
        const query = document.getElementById('searchInput').value;
        if (!query) return;

        document.getElementById('openVideos').innerHTML = 'מתחיל בבדיקה...';
        document.getElementById('blockedVideos').innerHTML = '';
        document.getElementById('hidden-check-container').innerHTML = '';

        try {
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=10&q=${encodeURIComponent(query)}&type=video&key=${API_KEY}`;
            const response = await fetch(url);
            const data = await response.json();

            if (data.error) throw new Error(data.error.message);

            document.getElementById('openVideos').innerHTML = '';
            
            data.items.forEach(video => {
                createVideoPlaceholder(video);
                checkVideoRealAccess(video.id.videoId);
            });
        } catch (error) {
            alert('שגיאת API: ' + error.message);
        }
    }

    // יצירת כרטיס זמני במצב "בבדיקה"
    function createVideoPlaceholder(video) {
        const videoId = video.id.videoId;
        const card = document.createElement('div');
        card.className = 'video-card';
        card.id = 'card-' + videoId;
        card.innerHTML = `
            <span class="status-badge checking-badge" id="status-${videoId}">בבדיקה...</span>
            <img src="https://i.ytimg.com/vi/${videoId}/mqdefault.jpg">
            <a href="https://www.youtube.com/watch?v=${videoId}" target="_blank">${video.snippet.title}</a>
        `;
        // בהתחלה כולם נכנסים לרשימת ה"חסומים/בבדיקה"
        document.getElementById('blockedVideos').appendChild(card);
    }

    function checkVideoRealAccess(videoId) {
        const checkDiv = document.createElement('div');
        checkDiv.id = 'checker-' + videoId;
        document.getElementById('hidden-check-container').appendChild(checkDiv);

        let checkTimeout = setTimeout(() => {
            finalizeStatus(videoId, false);
            player.destroy();
        }, 5000); // ממתין 5 שניות לטעינה

        let player = new YT.Player(checkDiv.id, {
            height: '0', width: '0', videoId: videoId,
            events: {
                'onReady': (event) => {
                    clearTimeout(checkTimeout);
                    finalizeStatus(videoId, true);
                    event.target.destroy();
                },
                'onError': () => {
                    clearTimeout(checkTimeout);
                    finalizeStatus(videoId, false);
                }
            }
        });
    }

    function finalizeStatus(videoId, isOpen) {
        const card = document.getElementById('card-' + videoId);
        const badge = document.getElementById('status-' + videoId);
        
        if (!card) return;

        if (isOpen) {
            badge.innerText = 'פתוח';
            badge.className = 'status-badge open-badge';
            document.getElementById('openVideos').appendChild(card);
        } else {
            badge.innerText = 'חסום / אין גישה';
            badge.className = 'status-badge blocked-badge';
            document.getElementById('blockedVideos').appendChild(card);
        }
    }
</script>

</body>
</html>
